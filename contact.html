<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 道バイト・リアル</title>
    <style>
        :root { --hokkaido-blue: #0056b3; --snow-white: #f0f4f8; }
        body { font-family: sans-serif; background-color: var(--snow-white); margin: 0; padding: 2rem; }
        .container { max-width: 600px; margin: auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--hokkaido-blue); border-bottom: 2px solid var(--hokkaido-blue); padding-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .submit-btn { background: var(--hokkaido-blue); color: white; border: none; padding: 1rem 2rem; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .back-link { display: block; margin-top: 1.5rem; text-align: center; color: #666; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>📩 お問い合わせ</h1>
    <p>掲載内容の修正依頼、削除要請、その他ご意見はこちらからお願いします。</p>
    <form action="https://formspree.io/f/XXXXXX" method="POST"> <div class="form-group">
            <label>お名前</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>件名</label>
            <input type="text" name="subject" required>
        </div>
        <div class="form-group">
            <label>メッセージ内容</label>
            <textarea name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="submit-btn">メッセージを送信する</button>
    </form>
    <a href="/" class="back-link">← TOPへ戻る</a>
</div>
</body>
</html>
