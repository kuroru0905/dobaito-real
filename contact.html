<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 道バイト・リアル</title>
    <style>
        :root { --hokkaido-blue: #0056b3; --snow-white: #f0f4f8; --text-gray: #444; }
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif; background-color: var(--snow-white); margin: 0; padding: 20px; color: var(--text-gray); }
        .container { max-width: 600px; margin: 2rem auto; background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--hokkaido-blue); }
        h1 { color: var(--hokkaido-blue); font-size: 1.8rem; margin-bottom: 1.5rem; text-align: center; }
        p { font-size: 0.95rem; line-height: 1.8; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.9rem; color: #555; }
        input, textarea { width: 100%; padding: 0.9rem; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; background-color: #fafafa; }
        input:focus, textarea:focus { border-color: var(--hokkaido-blue); outline: none; background-color: #fff; box-shadow: 0 0 8px rgba(0,86,179,0.1); }
        .submit-btn { background: var(--hokkaido-blue); color: white; border: none; padding: 1.1rem; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; transition: 0.3s; margin-top: 1rem; }
        .submit-btn:hover { background: #004494; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .back-link { display: block; margin-top: 2rem; text-align: center; color: #888; text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .back-link:hover { color: var(--hokkaido-blue); text-decoration: underline; }
        .note { font-size: 0.8rem; color: #999; margin-top: 1rem; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>📩 お問い合わせ</h1>
    <p>「道バイト・リアル」をご利用いただき、ありがとうございます。<br>掲載内容の修正依頼、不適切な投稿の報告、広告掲載のご相談など、こちらからお気軽にご連絡ください。</p>
    
    <form action="https://formspree.io/f/mpqyozeg" method="POST">
        <div class="form-group">
            <label>お名前（ハンドルネーム可）</label>
            <input type="text" name="name" placeholder="例：道産子 太郎" required>
        </div>
        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" name="_replyto" placeholder="例：example@mail.com" required>
        </div>
        <div class="form-group">
            <label>お問い合わせ件名</label>
            <input type="text" name="subject" placeholder="例：削除依頼について" required>
        </div>
        <div class="form-group">
            <label>メッセージ内容</label>
            <textarea name="message" rows="6" placeholder="具体的な内容、店舗名、投稿日時などをご記入ください..." required></textarea>
        </div>
        
        <input type="hidden" name="_next" value="https://dobaito-real.onrender.com/">
        
        <button type="submit" class="submit-btn">メッセージを送信する</button>
    </form>
    
    <div class="note">※通常3営業日以内に管理人（KURORU）より回答いたします。</div>
    <a href="/" class="back-link">← サイトTOPへ戻る</a>
</div>
</body>
</html>
