<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道バイト・リアル | 現場の圧を、見逃すな</title>
    <style>
        :root { --hokkaido-blue: #0056b3; --snow-white: #f0f4f8; --warning-red: #ff4d4d; --jojo-purple: #4b0082; }
        body { font-family: sans-serif; margin: 0; background-color: var(--snow-white); color: #333; }
        header { 
            background-image: linear-gradient(rgba(0, 86, 179, 0.7), rgba(0, 86, 179, 0.8)), url('header-bg.jpg'); 
            background-size: cover; background-position: center; color: white; padding: 4rem 1rem; text-align: center; 
        }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .post-section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 2.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .filter-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 2rem; justify-content: center; }
        .filter-btn { background: white; border: 2px solid var(--hokkaido-blue); color: var(--hokkaido-blue); padding: 8px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .filter-btn.active { background: var(--hokkaido-blue); color: white; }
        .warning-box { background: #fff5f5; border: 1px solid #feb2b2; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.85rem; color: #c53030; }
        .review-card { background: white; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; border-left: 6px solid var(--hokkaido-blue); position: relative; }
        .review-card.high-rated { border-left: 10px solid var(--jojo-purple); background: linear-gradient(135deg, #fff 0%, #f9f0ff 100%); }
        .review-card.high-rated::before { content: "ゴゴゴゴゴ…"; position: absolute; bottom: 5px; right: 10px; font-size: 1.5rem; font-weight: bold; color: rgba(0, 0, 0, 0.15); font-style: italic; }
        .shop-name { font-weight: bold; color: var(--hokkaido-blue); font-size: 1.1rem; }
        .review-date { font-size: 0.75rem; color: #999; margin-top: 5px; }
        .like-btn { background: none; border: 2px solid var(--hokkaido-blue); color: var(--hokkaido-blue); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        footer { text-align: center; padding: 2rem; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>
<header>
    <h1>🏔️ 道バイト・リアル</h1>
    <p style="font-size: 1.2rem; font-weight: bold;">働いていた時のリアルを匿名で共有しよう！</p>
</header>
<div class="container">
    <section class="post-section">
        <div class="warning-box"><strong>【投稿の掟：礼儀を忘れるな】</strong>誹謗中傷すれば人生を「”再起不能”（リタイア）」することになるぜ。</div>
        <div class="form-group" style="margin-bottom:10px;">
            <select id="postArea"><option value="">エリアを選択</option><option value="道央">道央</option><option value="道南">道南</option><option value="道北">道北</option><option value="道東">道東</option></select>
        </div>
        <div class="form-group" style="margin-bottom:10px;"><input type="text" id="postShop" placeholder="店名"></div>
        <div class="form-group" style="margin-bottom:10px;"><textarea id="postContent" rows="4" placeholder="リアルな実態..."></textarea></div>
        <button class="submit-btn" style="width:100%; padding:1rem; background:var(--warning-red); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;" onclick="addReview()">現実を投稿する</button>
    </section>
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterReviews('すべて', this)">すべて</button>
        <button class="filter-btn" onclick="filterReviews('道央', this)">道央</button>
        <button class="filter-btn" onclick="filterReviews('道南', this)">道南</button>
        <button class="filter-btn" onclick="filterReviews('道北', this)">道北</button>
        <button class="filter-btn" onclick="filterReviews('道東', this)">道東</button>
    </div>
    <div id="reviewList"></div>
</div>
<script>
    let allReviews = [];
    window.onload = loadReviews;
    async function loadReviews() {
        const response = await fetch('/api/reviews');
        allReviews = await response.json();
        renderReviews(allReviews);
    }
    function renderReviews(reviews) {
        const list = document.getElementById('reviewList');
        list.innerHTML = '';
        reviews.forEach(review => {
            const card = document.createElement('div');
            const isHighRated = (review.likes || 0) >= 3 ? 'high-rated' : '';
            card.className = `review-card ${isHighRated}`;
            card.innerHTML = `
                <div class="review-header"><span class="shop-name">${review.shop}</span><span style="background:#eee; padding:2px 8px; border-radius:4px; font-size:0.8rem; margin-left:10px;">${review.area}</span></div>
                <div class="review-date">🗓️ 投稿日: ${review.date}</div>
                <p class="review-content" style="margin-top:10px; white-space:pre-wrap;">${review.content}</p>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button class="like-btn" onclick="likeReview(${review.id})">🏔️ 道！ (${review.likes || 0})</button>
                    <button onclick="reportReview(${review.id})" style="background:none; border:none; color:#999; font-size:0.8rem; cursor:pointer; margin-top:10px;">🚩 削除依頼</button>
                </div>
            `;
            list.appendChild(card);
        });
    }
    function filterReviews(area, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderReviews(area === 'すべて' ? allReviews : allReviews.filter(r => r.area === area));
    }
    async function addReview() {
        const area = document.getElementById('postArea').value;
        const shop = document.getElementById('postShop').value.trim();
        const content = document.getElementById('postContent').value.trim();
        if (!area || !shop || !content) return alert("全部入力してくれ！");
        await fetch('/api/reviews', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ area, shop, content }) });
        location.reload();
    }
    async function likeReview(id) {
        await fetch(`/api/reviews/${id}/like`, { method: 'POST' });
        loadReviews();
    }
    async function reportReview(id) {
        const reason = prompt("削除依頼の理由を入力");
        if (!reason) return;
        await fetch(`/api/reviews/${id}/report`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ reason }) });
        alert("管理者に報告したぜ！");
    }
</script>
</body>
</html>
