<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン | 道バイト・リアル</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #2c3e50; color: white; }
        .login-box { background: #34495e; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 4px; }
        button { background: #1abc9c; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>管理者認証</h2>
        <input type="password" id="pass" placeholder="パスワードを入力">
        <button onclick="attemptLogin()">ログイン</button>
    </div>
    <script>
        async function attemptLogin() {
            const pass = document.getElementById('pass').value;
            const response = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            const result = await response.json();
            if (result.success) {
                location.href = '/admin.html';
            } else {
                alert("拒絶する。");
            }
        }
    </script>
</body>
</html>
