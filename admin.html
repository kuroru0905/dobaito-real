<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者パネル | 道バイト・リアル</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 2rem; }
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 2rem; border-radius: 12px; }
        .review-item { border-bottom: 1px solid #eee; padding: 1.5rem 0; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .report-badge { color: red; font-weight: bold; background: #fff0f0; padding: 5px; border-radius: 4px; margin-top: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>🏔️ 管理者専用パネル</h1>
    <div id="adminContent">
        <div style="text-align:center; padding:3rem;">
            <input type="password" id="adminPass" placeholder="Password...">
            <button onclick="adminLogin()">認証</button>
        </div>
    </div>
</div>

<script>
    window.onload = () => { if (localStorage.getItem('adminToken') === 'Shake0905') renderAdminView(); };

    async function adminLogin() {
        const password = document.getElementById('adminPass').value;
        const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });
        if (response.ok) {
            localStorage.setItem('adminToken', 'Shake0905');
            renderAdminView();
        } else alert("パスワードが違うぜ！");
    }

    async function renderAdminView() {
        const content = document.getElementById('adminContent');
        content.innerHTML = `<h3>投稿管理リスト</h3><div id="adminList">読み込み中...</div><br><button onclick="logout()">ログアウト</button>`;
        const reviews = await (await fetch('/api/reviews')).json();
        const list = document.getElementById('adminList');
        list.innerHTML = '';
        reviews.forEach(review => {
            const item = document.createElement('div');
            item.className = 'review-item';
            const reportAlert = review.is_reported ? `<div class="report-badge">⚠️ 削除依頼あり: ${review.report_reason}</div>` : '';
            item.innerHTML = `
                <div style="flex-grow:1; margin-right:1rem;">
                    <div><b>${review.shop}</b> [${review.area}]</div>
                    <div style="font-size:0.9rem; color:#666;">${review.content.substring(0,50)}...</div>
                    ${reportAlert}
                </div>
                <button class="delete-btn" onclick="deleteReview(${review.id})">削除</button>
            `;
            list.appendChild(item);
        });
    }

    async function deleteReview(id) {
        if (!confirm("本当に消すんだな？")) return;
        await fetch(`/api/reviews/${id}`, { method: 'DELETE' });
        renderAdminView();
    }

    function logout() { localStorage.removeItem('adminToken'); location.reload(); }
</script>
</body>
</html>
