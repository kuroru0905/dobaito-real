<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者パネル | 道バイト・リアル</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 2rem; }
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 0.5rem; }
        .login-box { text-align: center; padding: 3rem; }
        .review-item { border-bottom: 1px solid #eee; padding: 1rem 0; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .delete-btn:hover { background: #cc0000; }
        .info { flex-grow: 1; margin-right: 1rem; }
        .shop { font-weight: bold; color: #333; }
        .meta { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>🏔️ 管理者専用パネル</h1>
    <div id="adminContent">
        <div class="login-box">
            <p>パスワードを入力して潜入しろ</p>
            <input type="password" id="adminPass" placeholder="Password...">
            <button onclick="adminLogin()" style="padding: 0.5rem 1rem; cursor: pointer;">認証</button>
        </div>
    </div>
</div>

<script>
    let isAuthenticated = false;

    // 1. ログイン処理
    async function adminLogin() {
        const password = document.getElementById('adminPass').value;
        const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });

        if (response.ok) {
            isAuthenticated = true;
            renderAdminView();
        } else {
            alert("パスワードが違うぜ、出直してきな！");
        }
    }

    // 2. 管理画面の表示
    async function renderAdminView() {
        const content = document.getElementById('adminContent');
        content.innerHTML = `<h3>投稿管理リスト</h3><div id="adminList">読み込み中...</div>`;
        
        const response = await fetch('/api/reviews');
        const reviews = await response.json();
        const list = document.getElementById('adminList');
        list.innerHTML = '';

        reviews.forEach(review => {
            const item = document.createElement('div');
            item.className = 'review-item';
            // review.id が Supabaseから返ってくるIDだぜ
            item.innerHTML = `
                <div class="info">
                    <div class="shop">${review.shop} <span class="meta">[${review.area}]</span></div>
                    <div class="meta">${review.content.substring(0, 30)}...</div>
                </div>
                <button class="delete-btn" onclick="deleteReview(${review.id})">削除</button>
            `;
            list.appendChild(item);
        });
    }

    // 3. 削除処理（ここが重要だ！）
    async function deleteReview(id) {
        if (!confirm("本当にこの投稿を消し飛ばしていいんだな？")) return;

        const response = await fetch(`/api/reviews/${id}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            alert("削除完了だぜ。");
            renderAdminView(); // リストを更新
        } else {
            alert("削除に失敗したぜ。");
        }
    }
</script>
</body>
</html>
