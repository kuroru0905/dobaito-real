<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者パネル | 道バイト・リアル</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 2rem; }
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .review-item { border-bottom: 1px solid #eee; padding: 1rem 0; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .login-box { text-align: center; padding: 3rem; }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>🏔️ 管理者専用パネル</h1>
    <div id="adminContent">
        <div class="login-box">
            <input type="password" id="adminPass" placeholder="Password...">
            <button onclick="adminLogin()">認証</button>
        </div>
    </div>
</div>

<script>
    // ページ読み込み時にログイン済みかチェック
    window.onload = () => {
        if (localStorage.getItem('adminToken') === 'Shake0905') {
            renderAdminView();
        }
    };

    async function adminLogin() {
        const password = document.getElementById('adminPass').value;
        const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });
        if (response.ok) {
            const data = await response.json();
            localStorage.setItem('adminToken', data.token); // 記憶させるぜ！
            renderAdminView();
        } else {
            alert("パスワードが違うぜ！");
        }
    }

    async function renderAdminView() {
        const content = document.getElementById('adminContent');
        content.innerHTML = `<h3>投稿管理</h3><div id="adminList">読み込み中...</div><br><button onclick="logout()">ログアウト</button>`;
        const response = await fetch('/api/reviews');
        const reviews = await response.json();
        const list = document.getElementById('adminList');
        list.innerHTML = '';
        reviews.forEach(review => {
            const item = document.createElement('div');
            item.className = 'review-item';
            item.innerHTML = `
                <div><b>${review.shop}</b> [${review.area}]<br><small>${review.content.substring(0,20)}...</small></div>
                <button class="delete-btn" onclick="deleteReview(${review.id})">削除</button>
            `;
            list.appendChild(item);
        });
    }

    async function deleteReview(id) {
        if (!confirm("消すぜ？")) return;
        const response = await fetch(`/api/reviews/${id}`, { method: 'DELETE' });
        if (response.ok) {
            alert("削除完了！");
            renderAdminView();
        } else {
            alert("削除失敗だぜ...");
        }
    }

    function logout() {
        localStorage.removeItem('adminToken');
        location.reload();
    }
</script>
</body>
</html>
