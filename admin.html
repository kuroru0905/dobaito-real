<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者パネル | 道バイト・リアル</title>
    <style>
        :root { --hokkaido-blue: #0056b3; --warning-red: #ff4d4d; --jojo-purple: #4b0082; --jojo-gold: #ffcf00; }
        body { font-family: sans-serif; background: #f0f4f8; padding: 2rem; }
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 2rem; border-radius: 12px; }
        .review-item { border-bottom: 1px solid #eee; padding: 1.5rem 0; display: flex; flex-direction: column; }
        .item-main { display: flex; justify-content: space-between; align-items: flex-start; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .dismiss-btn { background: #4caf50; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        .report-badge { color: red; font-weight: bold; background: #fff0f0; padding: 10px; border-radius: 4px; margin-top: 10px; border: 1px solid #feb2b2; }
        
        /* 🚀 センター配置と統計カードの修正だッ！ */
        .stats-grid { display: flex; justify-content: center; margin-bottom: 30px; }
        .stat-card { 
            background: #1a1a1a; color: #fff; padding: 1.5rem; border-radius: 12px; 
            text-align: center; border: 3px solid var(--jojo-purple); 
            box-shadow: 0 4px 15px rgba(75, 0, 130, 0.3);
            width: 100%; max-width: 600px; /* カードをセンターに寄せるための幅制限だッ！ */
        }
        .total-posts-val { font-size: 2rem; font-weight: 900; color: var(--jojo-gold); margin: 5px 0 15px 0; }

        h2 { border-left: 8px solid var(--jojo-purple); padding-left: 15px; margin-top: 40px; color: var(--jojo-purple); }
        .tag-date { font-size: 0.8rem; color: #888; background: #eee; padding: 2px 6px; border-radius: 4px; }
        .inner-comment-list { margin-top: 15px; padding-left: 20px; border-left: 3px solid #ddd; }
        .inner-comment-item { background: #f9f9f9; padding: 8px; border-radius: 6px; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .column-form { background: #f9f9f9; padding: 1.5rem; border-radius: 12px; border: 2px solid var(--jojo-purple); margin-bottom: 20px; }
        .column-form input, .column-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .column-btn { background: var(--jojo-purple); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .search-panel { background: #eee; padding: 1rem; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .search-panel input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .search-panel label { font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>🏔️ 管理者専用パネル</h1>
    <div id="adminContent">
        <div style="text-align:center; padding:3rem;"><input type="password" id="adminPass" placeholder="Password..."><button onclick="adminLogin()">認証</button></div>
    </div>
</div>
<script>
    const SECRET_KEY = "MichiBaito_Secret_Session_Key_2026";
    
    window.onload = () => { 
        if (localStorage.getItem('adminToken') === SECRET_KEY) {
            renderAdminView(); 
        }
    };

    async function adminLogin() {
        const password = document.getElementById('adminPass').value;
        try {
            const response = await fetch('/api/admin/login', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ password }) 
            });
            
            if (response.ok) { 
                const data = await response.json();
                localStorage.setItem('adminToken', data.token); 
                await renderAdminView(); 
            } else {
                alert("違うぜ！やり直しだ！"); 
            }
        } catch (fetchErr) {
            alert("サーバーと通信ができねえぜッ！");
        }
    }

    async function renderAdminView() {
        const content = document.getElementById('adminContent');
        const res = await fetch('/api/admin/stats');
        if (!res.ok) throw new Error("統計取得失敗");
        const statsRes = await res.json();
        
        // 🚀 総投稿数を計算するぜッ！
        const totalPosts = Object.values(statsRes.areas).reduce((a, b) => a + b, 0);
        
        content.innerHTML = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div style="font-weight:bold; color:var(--jojo-gold);">📦 総投稿数（Reviews）</div>
                    <div class="total-posts-val">${totalPosts.toLocaleString()} 件</div>
                    <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
                    <div style="margin-bottom: 10px;">エリア別投稿分布</div>
                    <div style="font-size: 0.9rem; text-align:center; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;">
                        ${Object.entries(statsRes.areas).map(([area, count]) => `<span><b>${area}</b>: ${count}件</span>`).join('')}
                    </div>
                </div>
            </div>

            <h2>📜 管理者コラムを刻む</h2>
            <div class="column-form">
                <input type="text" id="colTitle" placeholder="魂のタイトル...">
                <textarea id="colContent" rows="5" placeholder="北海道のバイト事情について熱く語れッ！"></textarea>
                <button class="column-btn" onclick="postColumn()">コラムを公開する</button>
            </div>
            <div id="adminColumnList" style="margin-bottom: 30px;"></div>

            <h2>🚩 通報された返信 (Comments)</h2>
            <div id="adminCommentList" style="margin-bottom: 40px;">読み込み中...</div>

            <h2>📦 投稿管理リスト (Reviews)</h2>
            
            <div class="search-panel">
                <div>
                    <label>🔍 キーワード:</label>
                    <input type="text" id="adminSearchKeyword" placeholder="店名・内容..." oninput="applyFilter()">
                </div>
                <div>
                    <label>🗓️ 日付:</label>
                    <input type="date" id="adminSearchDate" onchange="applyFilter()">
                </div>
                <div style="flex-grow:1; text-align:right;">
                    <label style="cursor: pointer;">
                        <input type="checkbox" id="reportFilter" onchange="applyFilter()"> 🚩 通報のみ
                    </label>
                </div>
                <button onclick="resetAdminSearch()" style="font-size:0.7rem;">リセット</button>
            </div>

            <div id="adminList"></div>
            <br><button onclick="logout()">ログアウト</button>
        `;
        applyFilter(); 
        loadReportedComments(); 
        loadAdminColumns(); 
    }

    function resetAdminSearch() {
        document.getElementById('adminSearchKeyword').value = '';
        document.getElementById('adminSearchDate').value = '';
        document.getElementById('reportFilter').checked = false;
        applyFilter();
    }

    async function postColumn() {
        const title = document.getElementById('colTitle').value.trim();
        const content = document.getElementById('colContent').value.trim();
        if (!title || !content) return alert("タイトルと内容を埋めろッ！");
        if (!confirm("このひとりごとを公開してもいいか？")) return;

        const res = await fetch('/api/admin/columns', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, content })
        });
        if (res.ok) {
            alert("コラムを刻み込んだぜッ！");
            document.getElementById('colTitle').value = "";
            document.getElementById('colContent').value = "";
            loadAdminColumns();
        } else {
            alert("投稿失敗だ。");
        }
    }

    async function loadAdminColumns() {
        const list = document.getElementById('adminColumnList');
        const res = await fetch('/api/columns');
        const columns = await res.json();
        list.innerHTML = columns.map(c => `
            <div class="review-item" style="padding: 10px; background: #fff; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${c.title}</b>
                    <button class="delete-btn" style="padding:4px 8px; font-size:0.7rem;" onclick="deleteColumn(${c.id})">コラム削除</button>
                </div>
                <div style="font-size:0.8rem; color:#888; margin-top:5px;">🗓️ ${new Date(c.created_at).toLocaleDateString()}</div>
            </div>
        `).join('');
    }

    async function deleteColumn(id) {
        if (confirm("このコラムを消し去るか？")) {
            await fetch(`/api/admin/columns/${id}`, { method: 'DELETE' });
            loadAdminColumns();
        }
    }

    async function loadReportedComments() {
        const list = document.getElementById('adminCommentList');
        try {
            const res = await fetch('/api/admin/reported-comments');
            const comments = await res.json();
            list.innerHTML = "";

            if (comments.length === 0) {
                list.innerHTML = "<p style='color:#999; padding:10px;'>通報された返信はねえぜッ！</p>";
                return;
            }

            comments.forEach(c => {
                const item = document.createElement('div');
                item.className = 'review-item';
                const date = new Date(c.created_at).toLocaleString('ja-JP');
                item.innerHTML = `
                    <div class="item-main">
                        <div style="flex-grow:1;">
                            <div style="margin-bottom:5px;">
                                <span class="tag-date">🗓️ ${date}</span> 
                                <b>元投稿: ${c.reviews?.shop || '不明'}</b>
                            </div>
                            <div style="background:#f9f9f9; padding:10px; border-radius:6px; font-size:0.9rem;">${c.content}</div>
                            <div class="report-badge">⚠️ 理由: ${c.report_reason || '未入力'}</div>
                        </div>
                        <div style="margin-left:15px; display:flex; flex-direction:column; gap:5px;">
                            <button class="delete-btn" onclick="deleteComment(${c.id})">削除</button>
                            <button class="dismiss-btn" style="margin-left:0;" onclick="dismissComment(${c.id})">却下</button>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
        } catch (err) {
            list.innerHTML = "返信の読み込みに失敗だッ！";
        }
    }

    async function applyFilter() {
        const list = document.getElementById('adminList');
        const keyword = document.getElementById('adminSearchKeyword').value.toLowerCase();
        const searchDate = document.getElementById('adminSearchDate').value;
        const showOnlyReported = document.getElementById('reportFilter').checked;
        
        list.innerHTML = "解析中...";
        
        try {
            const res = await fetch('/api/reviews');
            const reviews = await res.json();
            list.innerHTML = "";
            
            const filteredReviews = reviews.filter(r => {
                if (showOnlyReported && !r.is_reported) return false;
                if (keyword && !r.shop.toLowerCase().includes(keyword) && !r.content.toLowerCase().includes(keyword)) return false;
                if (searchDate) {
                    const reviewDate = new Date(r.created_at).toLocaleDateString('sv-SE');
                    if (reviewDate !== searchDate) return false;
                }
                return true;
            });

            if (filteredReviews.length === 0) {
                list.innerHTML = "<p style='color:#999; padding:20px;'>該当する投稿は見つからねえぜッ！</p>";
                return;
            }

            for (const review of filteredReviews) {
                const item = document.createElement('div');
                item.className = 'review-item';
                const date = new Date(review.created_at).toLocaleString('ja-JP');
                
                const cRes = await fetch(`/api/reviews/${review.id}/comments`);
                const comments = await cRes.json();
                let innerCommentsHtml = "";
                if (comments.length > 0) {
                    innerCommentsHtml = `
                        <div class="inner-comment-list">
                            <small style="color:#888;">💬 この投稿への返信:</small>
                            ${comments.map(c => `
                                <div class="inner-comment-item">
                                    <span>${c.content} <small class="tag-date">${new Date(c.created_at).toLocaleString()}</small></span>
                                    <button class="delete-btn" style="padding:2px 8px; font-size:0.7rem;" onclick="deleteComment(${c.id})">返信削除</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                const reportAlert = review.is_reported ? `
                    <div class="report-badge">⚠️ 理由: ${review.report_reason} <button class="dismiss-btn" onclick="dismissReport(${review.id})">却下</button></div>` : '';
                
                item.innerHTML = `
                    <div class="item-main">
                        <div style="flex-grow:1;">
                            <div><b>${review.shop}</b> [${review.area}] <small class="tag-date">🗓️ ${date}</small></div>
                            <div style="background:#fff; padding:5px; border-radius:4px; font-size:0.9rem; color:#666; margin-top:5px; border:1px solid #f0f0f0;">${review.content}</div>
                            ${innerCommentsHtml}
                            ${reportAlert}
                        </div>
                        <button class="delete-btn" onclick="deleteReview(${review.id})">投稿削除</button>
                    </div>
                `;
                list.appendChild(item);
            }
        } catch (err) { list.innerHTML = "読み込み失敗だぜッ！"; }
    }

    async function deleteReview(id) { if (confirm("この投稿（および紐づく返信）をすべて消すぜ？")) { await fetch(`/api/reviews/${id}`, { method: 'DELETE' }); applyFilter(); } }
    async function dismissReport(id) {
        if (confirm("依頼を却下するぜ？")) { await fetch(`/api/reviews/${id}/dismiss`, { method: 'POST' }); applyFilter(); }
    }
    
    async function deleteComment(id) { 
        if (confirm("この返信だけを消し飛ばすか？")) { 
            await fetch(`/api/comments/${id}`, { method: 'DELETE' }); 
            applyFilter(); 
            loadReportedComments(); 
        } 
    }
    async function dismissComment(id) { if (confirm("通報を却下するぜ？")) { await fetch(`/api/comments/${id}/dismiss`, { method: 'POST' }); loadReportedComments(); } }

    function logout() { localStorage.removeItem('adminToken'); location.reload(); }
</script>
</body>
</html>
