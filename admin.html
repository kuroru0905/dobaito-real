<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者パネル | 道バイト・リアル</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 2rem; }
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 2rem; border-radius: 12px; }
        .review-item { border-bottom: 1px solid #eee; padding: 1.5rem 0; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .dismiss-btn { background: #4caf50; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        .report-badge { color: red; font-weight: bold; background: #fff0f0; padding: 10px; border-radius: 4px; margin-top: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1a1a; color: #ffcf00; padding: 1.5rem; border-radius: 12px; text-align: center; border: 2px solid #ffcf00; box-shadow: 0 4px 15px rgba(255, 207, 0, 0.2); }
        .stat-val { font-size: 2.5rem; font-weight: 900; margin: 10px 0; }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>🏔️ 管理者専用パネル</h1>
    <div id="adminContent">
        <div style="text-align:center; padding:3rem;"><input type="password" id="adminPass" placeholder="Password..."><button onclick="adminLogin()">認証</button></div>
    </div>
</div>
<script>
    const SECRET_KEY = "MichiBaito_Secret_Session_Key_2026";
    
    window.onload = () => { 
        if (localStorage.getItem('adminToken') === SECRET_KEY) {
            console.log("🔓 トークン一致。自動ログインを試みるぜッ！");
            renderAdminView(); 
        }
    };

    async function adminLogin() {
        const password = document.getElementById('adminPass').value;
        try {
            const response = await fetch('/api/admin/login', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ password }) 
            });
            
            if (response.ok) { 
                const data = await response.json();
                localStorage.setItem('adminToken', data.token); 
                console.log("🚀 サーバー認証成功。トークン保存ッ！");
                
                // 🚀 描画を試みる。ここで失敗してもエラーを吐くようにしたぜッ！
                try {
                    await renderAdminView(); 
                } catch (renderErr) {
                    console.error("🔥 描画エラーだッ！:", renderErr);
                    alert("認証はできたが、表示に失敗したぜッ！F12のコンソールを見てくれ。");
                }
            } else {
                alert("違うぜ！やり直しだ！"); 
            }
        } catch (fetchErr) {
            console.error("📡 通信エラーだッ！:", fetchErr);
            alert("サーバーと通信ができねえぜッ！");
        }
    }

    async function renderAdminView() {
        const content = document.getElementById('adminContent');
        
        // 🚀 APIからデータを取得。ここが失敗している可能性が高いッ！
        const res = await fetch('/api/admin/stats');
        if (!res.ok) throw new Error(`統計データ取得失敗 (Status: ${res.status})`);
        
        const statsRes = await res.json();
        
        content.innerHTML = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div>現在の総戦闘力 (総PV数)</div>
                    <div class="stat-val">${statsRes.pv.toLocaleString()}</div>
                    <small>※ページ読み込み回数だぜッ！</small>
                </div>
                <div class="stat-card" style="border-color: #4b0082; color: #fff;">
                    <div>エリア別投稿分布</div>
                    <div style="font-size: 0.8rem; margin-top:10px; text-align:left;">
                        ${Object.entries(statsRes.areas).map(([area, count]) => `<div>・${area}: ${count}件</div>`).join('')}
                    </div>
                </div>
            </div>
            <div style="margin-bottom: 20px; padding: 10px; background: #eee; border-radius: 8px;">
                <label style="font-weight: bold; cursor: pointer;">
                    <input type="checkbox" id="reportFilter" onchange="applyFilter()"> 🚩 削除依頼があった投稿のみ表示
                </label>
            </div>
            <h3>投稿管理リスト</h3>
            <div id="adminList"></div>
            <br><button onclick="logout()">ログアウト</button>
        `;
        applyFilter(); 
    }

    async function applyFilter() {
        const list = document.getElementById('adminList');
        if (!list) return; // 🛡️ 万が一の防御
        
        const showOnlyReported = document.getElementById('reportFilter').checked;
        list.innerHTML = "読み込み中...";
        
        try {
            const res = await fetch('/api/reviews');
            const reviews = await res.json();
            list.innerHTML = "";

            const filteredReviews = showOnlyReported ? reviews.filter(r => r.is_reported) : reviews;

            if (filteredReviews.length === 0) {
                list.innerHTML = "<p style='color:#999; padding:20px;'>対象の投稿はねえぜッ！</p>";
                return;
            }

            filteredReviews.forEach(review => {
                const item = document.createElement('div');
                item.className = 'review-item';
                const reportAlert = review.is_reported ? `
                    <div class="report-badge">
                        ⚠️ 削除依頼: ${review.report_reason}
                        <button class="dismiss-btn" onclick="dismissReport(${review.id})">依頼を却下</button>
                    </div>` : '';
                item.innerHTML = `
                    <div style="flex-grow:1;">
                        <div><b>${review.shop}</b> [${review.area}] <small>${review.created_at || review.date}</small></div>
                        <div style="font-size:0.9rem; color:#666;">${review.content}</div>
                        ${reportAlert}
                    </div>
                    <button class="delete-btn" onclick="deleteReview(${review.id})">削除</button>
                `;
                list.appendChild(item);
            });
        } catch (err) {
            console.error("🔥 リスト取得失敗:", err);
            list.innerHTML = "リストの読み込みに失敗したぜッ！";
        }
    }

    async function deleteReview(id) { if (confirm("消すぜ？")) { await fetch(`/api/reviews/${id}`, { method: 'DELETE' }); applyFilter(); } }
    async function dismissReport(id) {
        if (confirm("この依頼を却下して通報をリセットするぜ？")) {
            await fetch(`/api/reviews/${id}/dismiss`, { method: 'POST' });
            applyFilter();
        }
    }
    function logout() { localStorage.removeItem('adminToken'); location.reload(); }
</script>
</body>
</html>
